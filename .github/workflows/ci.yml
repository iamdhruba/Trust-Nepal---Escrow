name: NepalTrust CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  NODE_VERSION: '20'
  PNPM_VERSION: '9'

jobs:
  # ── Backend Tests ──────────────────────────────────────────────────────────
  backend-test:
    name: Backend — Lint & Test
    runs-on: ubuntu-latest
    services:
      mongodb:
        image: mongo:7.0
        ports: ['27017:27017']
        options: --health-cmd "mongosh --eval \"db.adminCommand('ping')\"" --health-interval 10s --health-timeout 5s --health-retries 5
      redis:
        image: redis:7.2-alpine
        ports: ['6379:6379']
        options: --health-cmd "redis-cli ping" --health-interval 5s --health-timeout 3s --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Generate RSA keys for tests
        run: |
          mkdir -p backend/keys
          openssl genrsa -out backend/keys/private.pem 2048
          openssl rsa -in backend/keys/private.pem -pubout -out backend/keys/public.pem

      - name: TypeScript check
        run: pnpm --filter api exec tsc --noEmit

      - name: Lint
        run: pnpm --filter api exec eslint src --ext .ts

      - name: Unit tests
        run: pnpm --filter api test -- --coverage --passWithNoTests
        env:
          NODE_ENV: test
          MONGO_URI: mongodb://localhost:27017/nepaltrust_test
          REDIS_URL: redis://localhost:6379
          AUDIT_SECRET: ci-test-secret

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        if: always()
        with:
          flags: backend

  # ── Admin Web Build ────────────────────────────────────────────────────────
  admin-web-build:
    name: Admin Web — Build & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: admin-web/package-lock.json

      - name: Install
        run: npm ci
        working-directory: admin-web

      - name: Lint
        run: npm run lint
        working-directory: admin-web

      - name: Build
        run: npm run build
        working-directory: admin-web

  # ── Flutter Tests ──────────────────────────────────────────────────────────
  flutter-test:
    name: Flutter — Analyze & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: '3.24.0'

      - name: Get packages
        run: flutter pub get
        working-directory: frontend

      - name: Analyze
        run: flutter analyze --no-fatal-infos
        working-directory: frontend

      - name: Test
        run: flutter test --coverage
        working-directory: frontend

  # ── Security Scan ──────────────────────────────────────────────────────────
  security:
    name: Security — Snyk + OWASP
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: pnpm install

      - name: Run Snyk (backend)
        uses: snyk/actions/node@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high --project-name=nepaltrust-api
          command: test

  # ── Docker Build & Push (main only) ───────────────────────────────────────
  docker-build:
    name: Docker — Build & Push
    runs-on: ubuntu-latest
    needs: [backend-test, admin-web-build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2
        with:
          region: ${{ secrets.AWS_REGION }}
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - name: Build & push API image
        run: |
          IMAGE_URI="${{ secrets.ECR_REGISTRY }}/nepaltrust-api:${{ github.sha }}"
          docker build -t $IMAGE_URI ./backend
          docker push $IMAGE_URI
          echo "IMAGE_URI=$IMAGE_URI" >> $GITHUB_ENV

      - name: Deploy to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition: infra/ecs/api-task-def.json
          service: nepaltrust-api
          cluster: nepaltrust-prod
          image: ${{ env.IMAGE_URI }}
          container-name: api
