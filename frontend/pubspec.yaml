name: trust_nepal
description: "Trust Nepal Escrow Mobile Application"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  intl: ^0.20.2
  google_fonts: ^8.1.0
  lucide_icons_flutter: ^3.1.13
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  firebase_core: ^3.10.1
  firebase_auth: ^5.4.4
  dio: ^5.4.1
  go_router: ^13.2.0
  flutter_secure_storage: ^9.0.0
  freezed_annotation: ^2.4.1
  json_annotation: ^4.8.1
  device_info_plus: ^10.1.0
  socket_io_client: ^3.0.2
  image_picker: ^1.1.2
  http: ^1.2.1
  url_launcher: ^6.3.0
  mobile_scanner: ^5.2.3
  webview_flutter: ^4.10.0
  mime: ^1.0.5
  esewa_flutter_sdk:
    path: ../eSewa Flutter Sdk v2.5.5_25/esewa_flutter_sdk
  firebase_messaging: ^15.2.10
  local_auth: ^3.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.4.0
  build_runner: ^2.4.8
  riverpod_generator: ^2.4.0
  freezed: ^2.4.7
  json_serializable: ^6.7.1

flutter:
  uses-material-design: true

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon/app_icon.png"
  min_sdk_android: 21
  web:
    generate: true
    image_path: "assets/icon/app_icon.png"
    background_color: "#051424"
    theme_color: "#10B981"

flutter_native_splash:
  color: "#051424"
  image: assets/icon/app_icon.png
  android: true
  ios: true
  android_12:
    image: assets/icon/app_icon.png
    icon_background_color: "#051424"
    color: "#051424"
